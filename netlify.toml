[build]
  command = "npm run build"
  publish = "dist"

# Route API endpoints directly to Netlify Serverless Functions
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/scope-generator"
  to = "/.netlify/functions/scope-generator"
  status = 200

# Fallback for Single Page Application routing (reloads don't crash)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
